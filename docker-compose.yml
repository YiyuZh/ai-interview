services:
  app:
    build:
      context: ./ai-interview-backend
      dockerfile: Dockerfile
    image: ai-interview-backend:prod
    container_name: ai-interview-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ENV: production
    command: sh -c "uvicorn main:app --host 0.0.0.0 --port ${API_PORT:-8001} --workers ${UVICORN_WORKERS:-1}"
    volumes:
      - ./ai-interview-backend/logs:/app/logs
      - ./ai-interview-backend/uploads:/app/uploads
    ports:
      - "127.0.0.1:${API_LOCAL_PORT:-18001}:${API_PORT:-8001}"
    expose:
      - "${API_PORT:-8001}"
    networks:
      - ai-private
      - shared_gateway
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import os, urllib.request
          port = os.getenv("API_PORT", "8001")
          urllib.request.urlopen(f"http://127.0.0.1:{port}/api/v1/config/health")
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: ai-interview-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ai-interview-redis
    restart: unless-stopped
    env_file:
      - ./.env
    command: >
      sh -c 'if [ -n "$REDIS_PASSWORD" ];
      then exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD";
      else exec redis-server --appendonly yes;
      fi'
    volumes:
      - ./volumes/redis:/data
    networks:
      - ai-private
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$REDIS_PASSWORD\" ]; then redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  celery-worker:
    build:
      context: ./ai-interview-backend
      dockerfile: Dockerfile
    image: ai-interview-backend:prod
    container_name: ai-interview-celery-worker
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ENV: production
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./ai-interview-backend/logs:/app/logs
      - ./ai-interview-backend/uploads:/app/uploads
    networks:
      - ai-private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

  celery-beat:
    build:
      context: ./ai-interview-backend
      dockerfile: Dockerfile
    image: ai-interview-backend:prod
    container_name: ai-interview-celery-beat
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      ENV: production
    command: celery -A app.core.celery_app beat --loglevel=info --schedule /app/celerybeat-schedule/celerybeat-schedule.db
    volumes:
      - ./ai-interview-backend/logs:/app/logs
      - ./ai-interview-backend/uploads:/app/uploads
      - ./ai-interview-backend/celerybeat:/app/celerybeat-schedule
    networks:
      - ai-private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

  frontend:
    build:
      context: ./ai-interview-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_API_TIMEOUT: 60000
        VITE_APP_BASE: /
    image: ai-interview-frontend:prod
    container_name: ai-interview-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_LOCAL_PORT:-13000}:80"
    networks:
      - shared_gateway
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  admin:
    build:
      context: ./ai-interview-admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1/backoffice
        VITE_API_TIMEOUT: 30000
        VITE_APP_BASE: /
    image: ai-interview-admin:prod
    container_name: ai-interview-admin
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMIN_LOCAL_PORT:-13001}:80"
    networks:
      - shared_gateway
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ai-private:
    driver: bridge
  shared_gateway:
    external: true
    name: ${SHARED_CADDY_NETWORK:-shared_gateway}
